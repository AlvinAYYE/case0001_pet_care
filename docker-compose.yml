services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pet_hotel_site}
      MYSQL_USER: ${MYSQL_USER:-pet_hotel}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-pet_hotel_secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Taipei}
      APP_FRONTEND_ORIGIN: ${APP_FRONTEND_ORIGIN:-http://localhost:5180}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_API_KEY: ${APP_API_KEY:-dev-local-api-key}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-pet_hotel_site}
      DB_USER: ${MYSQL_USER:-pet_hotel}
      DB_PASS: ${MYSQL_PASSWORD:-pet_hotel_secret}
      DB_CHARSET: utf8mb4
    command: /bin/sh -c "mkdir -p /var/www/html/public/uploads && chown -R www-data:www-data /var/www/html/public/uploads && chmod -R ug+rwX /var/www/html/public/uploads && apache2-foreground"
    ports:
      - "${BACKEND_PORT:-8080}:80"
    volumes:
      - ./backend/public/uploads:/var/www/html/public/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_NEWS_API_URL: ${VITE_NEWS_API_URL:-/api/news.php}
        VITE_SENIOR_API_URL: ${VITE_SENIOR_API_URL:-/api/senior-care.php}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5180}:80"

volumes:
  mysql_data:

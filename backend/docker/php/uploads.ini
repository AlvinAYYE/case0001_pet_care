file_uploads = On
upload_max_filesize = 16M
post_max_size = 16M
max_file_uploads = 20
memory_limit = 256M
max_execution_time = 60
max_input_time = 60

; Keep runtime timezone aligned with backend default
date.timezone = Asia/Taipei

; Production-safe error behavior
display_errors = Off
log_errors = On
error_reporting = E_ALL

; Basic session hardening (admin uses PHP sessions for flash messages)
session.use_strict_mode = 1
session.cookie_httponly = 1
session.cookie_samesite = Lax

; Reduce fingerprinting
expose_php = Off
